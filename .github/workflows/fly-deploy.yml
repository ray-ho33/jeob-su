name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: fly-deploy

jobs:
  deploy:
    name: Deploy HTTP MCP server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP_NAME: ${{ vars.FLY_APP_NAME || 'jeob-su-acr-mcp' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app "$FLY_APP_NAME"
